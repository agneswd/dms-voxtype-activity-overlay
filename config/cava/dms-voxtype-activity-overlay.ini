[general]
bars = 12
framerate = 60
# Autosensitivity helps keep bars visible even with quiet speech
autosens = 1
sensitivity = 100
noise_reduction = 35

[input]
method = pipewire
# ~CAPTURE tells PipeWire to listen on the default capture/mic device
source = ~CAPTURE

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
# Semicolon between bars, newline between frames (Quickshell SplitParser reads per-line)
bar_delimiter = 59
frame_delimiter = 10
channels = mono
